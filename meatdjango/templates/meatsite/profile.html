{% extends 'base.html' %}
{% load static %}

{% block title %}Профиль{% endblock %}

{% block content %}
<section class="section">
    <h2>Профиль пользователя</h2>
    <p>Вы вошли как: <strong id="profile-username"></strong></p>
    <p id="profile-email-wrap" hidden>Email: <strong id="profile-email"></strong></p>
</section>

<section class="section">
    <h3>История заказов</h3>
    <div id="profile-orders" class="orders-list"></div>
    <p id="profile-orders-empty" hidden>У вас пока нет заказов.</p>
</section>

<section class="section">
    <h3>Ваши отзывы</h3>
    <div id="profile-reviews" class="reviews-grid"></div>
    <p id="profile-reviews-empty" hidden>Вы пока не оставляли отзывов.</p>
</section>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/api-client.js' %}"></script>
<script src="{% static 'js/profile.js' %}"></script>
{% endblock %}
