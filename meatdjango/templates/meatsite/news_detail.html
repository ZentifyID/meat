{% extends 'base.html' %}
{% load static %}

{% block title %}Новость{% endblock %}

{% block content %}

<div class="breadcrumbs">
    <a href="{% url 'home' %}">Главная</a> /
    <a href="{% url 'about' %}">О компании</a> /
    <span id="news-detail-breadcrumb">Новость</span>
</div>

<section class="section news-detail" id="news-detail-root" data-news-id="{{ news_id }}">
    <h2 id="news-detail-title">Загрузка...</h2>

    <p class="news-date" id="news-detail-date"></p>

    <img id="news-detail-image" class="news-detail-image" alt="Изображение новости" hidden>

    <p class="news-lead" id="news-detail-lead" hidden></p>

    <div class="news-content" id="news-detail-content"></div>

    <p id="news-detail-error" class="review-error-message" hidden></p>
</section>

{% endblock %}

{% block extra_js %}
<script src="{% static 'js/api-client.js' %}"></script>
<script src="{% static 'js/news-detail.js' %}"></script>
{% endblock %}
