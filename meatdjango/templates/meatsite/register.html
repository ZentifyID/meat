{% extends 'base.html' %}
{% load static %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<section class="section auth-section">
    <h3>Регистрация</h3>

    <p id="register-error" class="review-error-message" hidden></p>

    <form id="register-form" class="auth-form">
        <div class="form-row">
            <label for="register-username">Логин</label>
            <input id="register-username" name="username" type="text" autocomplete="username" required>
        </div>

        <div class="form-row">
            <label for="register-email">Email</label>
            <input id="register-email" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="form-row">
            <label for="register-password1">Пароль</label>
            <input id="register-password1" name="password1" type="password" autocomplete="new-password" required>
        </div>

        <div class="form-row">
            <label for="register-password2">Подтверждение пароля</label>
            <input id="register-password2" name="password2" type="password" autocomplete="new-password" required>
        </div>

        <button type="submit" class="btn">Создать аккаунт</button>
    </form>

    <p class="auth-note">Уже есть аккаунт? <a href="{% url 'login' %}">Войдите</a></p>
</section>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/api-client.js' %}"></script>
<script src="{% static 'js/auth-register.js' %}"></script>
{% endblock %}
