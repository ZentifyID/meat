{% extends 'base.html' %}
{% load static %}

{% block title %}Продукция{% endblock %}

{% block content %}
<section class="section">
    <h2>Наша продукция</h2>

    <form id="products-filter-form" class="filter-form">
        <input
            id="products-query"
            type="text"
            name="q"
            placeholder="Поиск по названию..."
            value=""
        >

        <select id="products-category" name="category">
            <option value="">Все категории</option>
        </select>

        <button type="submit" class="btn">Найти</button>
        <button type="reset" class="btn reset-btn">Сбросить</button>
    </form>
</section>

<div id="products-list" class="products"></div>

<div id="products-empty" class="section" hidden>
    <p>По вашему запросу ничего не найдено.</p>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/api-client.js' %}"></script>
<script src="{% static 'js/products.js' %}"></script>
{% endblock %}
