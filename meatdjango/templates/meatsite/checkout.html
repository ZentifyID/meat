{% extends 'base.html' %}
{% load static %}

{% block title %}Оформление заказа{% endblock %}

{% block content %}
<section class="section">
    <h2>Оформление заказа</h2>

    <form id="checkout-form" class="checkout-form">
        <input type="text" name="full_name" placeholder="Ваше имя" value="{% if user.is_authenticated %}{{ user.get_full_name|default:user.username }}{% endif %}" required>
        <input type="text" name="phone" placeholder="Телефон" required>
        <input type="email" name="email" placeholder="Email" value="{% if user.is_authenticated %}{{ user.email }}{% endif %}">
        <textarea name="address" placeholder="Адрес доставки" required></textarea>

        <h3>Ваш заказ</h3>
        <div id="checkout-items"></div>

        <p id="checkout-total"></p>
        <p id="checkout-empty" hidden>Корзина пуста. Добавьте товары перед оформлением заказа.</p>

        <button type="submit" class="btn">Подтвердить заказ</button>
    </form>
</section>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/api-client.js' %}"></script>
<script src="{% static 'js/checkout.js' %}"></script>
{% endblock %}
