{% extends 'base.html' %}
{% load static %}

{% block title %}Корзина{% endblock %}

{% block content %}
<section class="section">
    <h2>Корзина</h2>

    <div id="cart-items"></div>

    <p id="cart-empty" hidden>Корзина пуста.</p>

    <div class="section">
        <h3 id="cart-total"></h3>
        <a id="cart-checkout-button" href="{% url 'checkout' %}" class="btn" hidden>Оформить заказ</a>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/api-client.js' %}"></script>
<script src="{% static 'js/cart.js' %}"></script>
{% endblock %}
